<!-- html setup -->
<!DOCTYPE html>
<!-- Setting up a Listener to move the torch on every mouse movement -->
<html lang="en" onmousemove="mainTorchMovement(event)">



    <!-- ============================================================================================== -->
    <!-- =========================================== Header =========================================== -->
    <!-- ============================================================================================== -->
    <!-- The <head> tag is used for the setup of meta data, and pauses for loading separate files -->
    <head>
        <!-- Setting the Title and Icon -->
        <title>J.Kom Videos</title>
        <link rel="icon" type="image/x-icon" href="/images/favicon.png">

        <!-- Setting information on how a page should be displayed based on the device -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- ============================================= CSS ============================================= -->
        <!-- Importing the main CSS file -->
        <link rel="stylesheet" href="/mainCSS.css">

        <!-- ============================================= Scripts ============================================= -->
        <script src="/mainJS.js"></script> 

        <!-- Updating the Theme's colors before any rendering Begins -->
        <script>
            updateTheme();
        </script>
    </head>



    <!-- ============================================================================================== -->
    <!-- ========================================== HTMLBody ========================================== -->
    <!-- ============================================================================================== -->
    <body onload="setupWebsite();">

        <!-- Loading the header and setups, the html is fetched from a separate file with javascript. -->
        <!-- The <a> element is used to avoid the creation of a scrolling container, so scrolling context remains within <body> -->
        <!-- There may be a more appropriate non block level for holding these elements. -->
        <a id="headerAndSetup"></a>

        <!-- Executing the code behind loading the header, and updating theme assets. As ideally this is done as soon as possible in Loading. -->
        <script>loadHeader();</script>

        <!--
        ==========================================================================================================
        ==========================================================================================================
        =================================== Beginning of Pages Unique Content ====================================
        ==========================================================================================================
        ==========================================================================================================
        -->

        <!-- Title -->
        <section>
            <div>
                <div style="flex: 0 0 300px; margin: 12px; margin-top: 25px; font-size: 2.8em; font-weight: bold; text-align: center;">
                    Films and Videos <br>
                </div>
            </div>
        </section>

        <!-- Intro -->
        <section>
            <div class="rowOfObjectsCentered">
                <div style="flex: 0 0 400px; margin: 16px; text-align: center;">
                    I have been creating videos for a very long time. Either for fun on my own, with friends, or in schools.
                    I almost even majored in film, but have decided to keep it a hobby.
                </div>
            </div>
        </section>

        

        <!-- Individual Projects Pages -->
        <section>
            <div class="rowOfObjectsCentered">
                <a href="">
                    <div class="manySmallItemsGroup"">
                        <div class="manySmallItemsText" style="font-size: 1.7em; font-weight: bold; text-align: center;">
                            Films
                            <br>
                            <br>
                        </div>
                        <div class="manySmallItemsImages">
                            <img width="250px" src="/images/filmsAndVideo/iconFilms.jpg">
                        </div>
                    </div>
                </a>

                <a href="">
                    <div class="manySmallItemsGroup">
                        <div class="manySmallItemsText" style="font-size: 1.7em; font-weight: bold; text-align: center;">
                            Photography
                            <br>
                            <br>
                        </div>
                        <div class="manySmallItemsImages">
                            <img width="250px" src="/images/filmsAndVideo/iconPhotography.jpg">
                        </div>
                    </div>
                </a>

                <a href="">
                    <div class="manySmallItemsGroup">
                        <div class="manySmallItemsText" style="font-size: 1.7em; font-weight: bold; text-align: center;">
                            Gaming Challenges
                            <br>
                        </div>
                        <div class="manySmallItemsImages">
                            <img width="250px" src="/images/filmsAndVideo/iconGamingChallenges.jpg">
                        </div>
                    </div>
                </a>

                <a href="">
                    <div class="manySmallItemsGroup">
                        <div class="manySmallItemsText" style="font-size: 1.7em; font-weight: bold; text-align: center;">
                            Very Unserious Videos
                            <br>
                        </div>
                        <div class="manySmallItemsImages">
                            <img width="250px" src="/images/filmsAndVideo/iconVeryUnseriousVideos.jpg">
                        </div>
                    </div>
                </a>

            </div>
        </section>

      

    </body>
</html>
